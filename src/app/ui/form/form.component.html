<div class="__form_container__">
    @defer () {
    <form class="form" action="" [formGroup]="fs.formData()">
        <div class="logo_heading">
            <img src="logo.ico" alt="Logo image">
            <h1 id="heading_text">{{fs.formType() == 'signup' ? 'Create Account' : 'Login'}}</h1>
        </div>

        <div class="__input_container__" *inputContainerFor="'name'">
            <input autocomplete="off" inputRef type="text" formControlName="name" aria-label="Name Input Field" name="name">
            <label htmlFor="name">Name</label>
            <div @icon class="status_icon not_password" *ngIf="fs.formData()?.get('name')?.valid">
                <div><mat-icon>check_small</mat-icon></div>
            </div>
        </div>

        <crep-form [form]="fs.formData()"></crep-form>

        <div class="__input_container__" *inputContainerFor="'confirm_password'">
            <input autocomplete="off" inputRef #cpassInput type="password" formControlName="confirm_password" aria-label="Confirm Password Input Field" name="confirm_password">
            <label htmlFor="confirm_password">Confirm Password</label>
            <div @icon class="status_icon" *ngIf="fs.formData().get('confirm_password')?.valid">
                <div><mat-icon>check_small</mat-icon></div>
            </div>
            <button tabindex="-1" [buttonRef]="cpassInput" @icon type="button" class="VISIBILITY"
                *ngIf="fs.formData().get('confirm_password')?.value?.length > 0"><mat-icon>{{cpassInput.type == "password" ? "visibility" : "visibility_off"}}</mat-icon></button>
        </div>

        <div class="__signup_login_helper_links__">
            <p *ngIf="fs.formType() == 'signup'">Already have an account? <a routerLink="/login">Login</a></p>
            <p *ngIf="fs.formType() == 'login'">Don't have an account? <a routerLink="/signup">Signup</a></p>
        </div>

        <div class="__submit_btn_container__">
            <button buttonRef="SUBMIT_BTN" type="button"></button>
        </div>
    </form>
    }
    @loading (minimum 500ms) {
    <div>
        <p>Loading...</p>
    </div>
    }
    @error {
        <p>Please refresh the page</p>
    }
</div>
